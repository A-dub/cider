name: Test Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build & Smoke Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Version
        run: ./cider --version

      - name: Help text
        run: |
          ./cider --help
          ./cider notes --help
          ./cider rem --help
          ./cider sync --help

      - name: Error handling
        run: |
          # Unknown command exits non-zero
          ./cider bogus 2>/dev/null && exit 1 || true
          # Unknown notes subcommand exits non-zero
          ./cider notes bogus 2>/dev/null && exit 1 || true
          # Nonexistent note exits non-zero
          ./cider notes show 99999 2>/dev/null && exit 1 || true
          # Replace on nonexistent note exits non-zero
          ./cider notes replace 99999 --find x --replace y 2>/dev/null && exit 1 || true
          echo "All error handling tests passed"

  integration:
    name: Integration Tests
    runs-on: self-hosted
    if: github.event_name == 'release' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Run tests
        run: make test
